function periodArrayToObjects(arr) {
  return arr.map(function(r) {
    return {
      region: r[0], store: r[1], counterId: r[2], counterName: r[3], content: r[4],
      amount: r[5], startDate: r[6], endDate: r[7], offPeakDef: r[8],
      dailySaturation: r[9], targetWriteOff: r[10], actualWriteOff: r[11]
    };
  });
}

function currentRawData() {
  return periodArrayToObjects(PERIOD_RAW_DATA[currentPeriod] || []);
}

// Get previous period data for comparison
function getPreviousPeriod() {
  const keys = Object.keys(PERIOD_CONFIG);
  const idx = keys.indexOf(currentPeriod);
  return idx > 0 ? keys[idx-1] : null;
}

// ==================== LOCAL STORAGE ====================
function storageKey(base) { return base + '_' + currentPeriod; }
const SAVE_KEY_WRITEOFF = 'caw_';
const SAVE_KEY_SATURATION = 'cds_';

function loadSavedData() {
  const rawData = PERIOD_RAW_DATA[currentPeriod];
  if (!rawData) return;
  let sw = {}, ss = {};
  try { sw = JSON.parse(localStorage.getItem(storageKey(SAVE_KEY_WRITEOFF))) || {}; } catch(e) {}
  try { ss = JSON.parse(localStorage.getItem(storageKey(SAVE_KEY_SATURATION))) || {}; } catch(e) {}
  rawData.forEach(r => {
    if (sw[r[2]] !== undefined) r[11] = sw[r[2]];
    if (ss[r[2]] !== undefined) r[9] = ss[r[2]];
  });
}

const DAY_MAP = {'周一':1,'周二':2,'周三':3,'周四':4,'周五':5,'周六':6,'周日':7};
function parseDate(str) {
  const s = String(str).trim();
  if (s.length !== 8) return null;
  return new Date(parseInt(s.substring(0,4)), parseInt(s.substring(4,6))-1, parseInt(s.substring(6,8)));
}
function formatDate8(date) { return date.getFullYear()+String(date.getMonth()+1).padStart(2,'0')+String(date.getDate()).padStart(2,'0'); }
function getDayOfWeekCN(date) { const d = date.getDay(); return d===0 ? 7 : d; }

function parseOffPeakDays(str) {
  if (!str || !str.trim()) return [1,2,3,4,5,6,7];
  if (str.includes('节假日') || str.includes('节日')) return [1,2,3,4,5,6,7];
  const days = new Set();
  const normalized = str.replace(/～/g, '至');
  normalized.split(/[、,，]/).forEach(p => {
    p = p.trim(); if (!p) return;
    if (p.includes('至')) {
      const [s, e] = p.split('至');
      const sd = DAY_MAP[s.trim()], ed = DAY_MAP[e.trim()];
      if (sd && ed) for (let d = sd; d <= ed; d++) days.add(d);
    } else if (p==='全周'||p==='每天'||p==='每日') {
      for (let d=1;d<=7;d++) days.add(d);
    } else {
      const d = DAY_MAP[p]; if (d) days.add(d);
    }
  });
  const result = Array.from(days).sort((a,b)=>a-b);
  return result.length>0 ? result : [1,2,3,4,5,6,7];
}

function countOffPeakDays(startStr, endStr, offPeakDays) {
  const start = parseDate(startStr), end = parseDate(endStr);
  if (!start || !end || start > end) return 0;
  let count = 0;
  const cur = new Date(start);
  while (cur <= end) { if (offPeakDays.includes(getDayOfWeekCN(cur))) count++; cur.setDate(cur.getDate()+1); }
  return count;
}

function parseSaturation(raw) {
  const str = String(raw).trim();
  const totalMatch = str.match(/^总量(\d+)/);
  if (totalMatch) return { mode: 'total', value: parseInt(totalMatch[1]) };
  const num = parseInt(str);
  if (!isNaN(num)) return { mode: 'daily', value: num };
  return { mode: 'daily', value: 0 };
}

function calculateForPeriod(periodKey, cmdDateStr) {
  const rawArr = PERIOD_RAW_DATA[periodKey];
  if (!rawArr) return [];
  const cmdDate = parseDate(cmdDateStr);
  if (!cmdDate) return [];
  const rows = periodArrayToObjects(rawArr);
  return rows.map(row => {
    const startDate = parseDate(row.startDate);
    const endDate = parseDate(row.endDate);
    const offPeakDays = parseOffPeakDays(row.offPeakDef);
    const effectiveEnd = cmdDate < endDate ? cmdDate : endDate;
    const K = countOffPeakDays(row.startDate, row.endDate, offPeakDays);
    let L = 0;
    if (cmdDate >= startDate) L = countOffPeakDays(row.startDate, formatDate8(effectiveEnd), offPeakDays);
    const M = K > 0 ? row.amount / K : 0;
    const N = M * L;
    const P = K > 0 ? L / K : 0;
    const satInfo = parseSaturation(row.dailySaturation);
    const Q = satInfo.mode === 'total' ? satInfo.value * P : satInfo.value * L;
    const R = row.actualWriteOff;
    const S = Q > 0 ? R / Q : null;
    const T = R > 0 ? N / R : null;
    return { ...row, K, L, M, N, P, Q, R, S, T, satInfo, offPeakDays, startDateObj: startDate, endDateObj: endDate };
  });
}

let currentCalcData = [];
let prevCalcData = [];

function recalculateAll() {
  currentCmdDate = PERIOD_CONFIG[currentPeriod].cutoff;
  currentCalcData = calculateForPeriod(currentPeriod, currentCmdDate);
  const prevPeriod = getPreviousPeriod();
  prevCalcData = prevPeriod ? calculateForPeriod(prevPeriod, PERIOD_CONFIG[prevPeriod].cutoff) : [];
  // Build comparison map
  const prevMap = {};
  prevCalcData.forEach(r => { prevMap[r.counterId] = r.S; });
  currentCalcData.forEach(r => {
    if (prevMap[r.counterId] !== undefined && r.S !== null && prevMap[r.counterId] !== null) {
      r.prevS = prevMap[r.counterId];
      r.satDiff = r.S - prevMap[r.counterId];
    } else {
      r.prevS = null;
      r.satDiff = null;
    }
  });
}

// ==================== AGGREGATION ====================
function aggregateStore(rows) {
  const storeMap = {};
  rows.forEach(r => {
    const key = r.region+'|||'+r.store;
    if (!storeMap[key]) storeMap[key]={region:r.region,store:r.store,counterIds:new Set(),sumQ:0,sumR:0,sumN:0,sumAmount:0,sumTarget:0};
    const s = storeMap[key];
    s.counterIds.add(r.counterId); s.sumQ+=r.Q; s.sumR+=r.R; s.sumN+=r.N; s.sumAmount+=r.amount;
    s.sumTarget+=(typeof r.targetWriteOff==='number'?r.targetWriteOff:0);
  });
  return Object.values(storeMap).map(s=>({
    region:s.region,store:s.store,counterCount:s.counterIds.size,
    sumQ:s.sumQ,sumR:s.sumR,sumN:s.sumN,sumAmount:s.sumAmount,sumTarget:s.sumTarget,
    saturation:s.sumQ>0?s.sumR/s.sumQ:null, avgCost:s.sumR>0?s.sumN/s.sumR:null
  }));
}
function aggregateRegion(storeRows) {
  const rm={};
  storeRows.forEach(s=>{
    const k=s.region;
    if(!rm[k])rm[k]={region:s.region,storeSet:new Set(),counterCount:0,sumQ:0,sumR:0,sumN:0,sumAmount:0,sumTarget:0};
    const r=rm[k];r.storeSet.add(s.store);r.counterCount+=s.counterCount;
    r.sumQ+=s.sumQ;r.sumR+=s.sumR;r.sumN+=s.sumN;r.sumAmount+=s.sumAmount;r.sumTarget+=s.sumTarget;
  });
  return Object.values(rm).map(r=>({
    region:r.region,storeCount:r.storeSet.size,counterCount:r.counterCount,
    sumQ:r.sumQ,sumR:r.sumR,sumN:r.sumN,sumAmount:r.sumAmount,sumTarget:r.sumTarget,
    saturation:r.sumQ>0?r.sumR/r.sumQ:null, avgCost:r.sumR>0?r.sumN/r.sumR:null
  }));
}

// ==================== FORMATTING ====================
function fmtNum(n,d){if(n==null||isNaN(n))return'-';return n.toLocaleString('zh-CN',{minimumFractionDigits:d||0,maximumFractionDigits:d||0});}
function fmtMoney(n){if(n==null||isNaN(n))return'-';return '¥'+n.toLocaleString('zh-CN',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fmtMoneyDec(n){if(n==null||isNaN(n))return'-';return '¥'+n.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtPct(n){if(n==null)return'-';return (n*100).toFixed(1)+'%';}
function fmtPctHtml(n){if(n==null)return'-';const p=n*100;let c=p>=80?'rate-high':p>=50?'rate-mid':'rate-low';return '<span class=\"'+c+'\">'+p.toFixed(1)+'%</span>';}
function fmtCostHtml(n){if(n==null)return'-';let c=n<=80?'cost-good':'cost-warn';return '<span class=\"'+c+'\">¥'+n.toFixed(2)+'</span>';}
function fmtDate8(str){if(!str||str.length!==8)return str;return str.substring(0,4)+'-'+str.substring(4,6)+'-'+str.substring(6,8);}
function fmtDiffHtml(diff){if(diff==null)return'<span class=\"nodata\">-</span>';const sign=diff>=0?'+':'';let c=diff>=0?'trend-up':'trend-down';return '<span class=\"'+c+'\">'+sign+(diff*100).toFixed(1)+'%</span>';}
function getCutoffLabel(){const d=parseDate(currentCmdDate);if(!d)return'';return '（截至'+(d.getMonth()+1)+'.'+d.getDate()+'）';}

function onWriteOffChange(input){
  const cid=input.dataset.cid,val=parseInt(input.value)||0;
  const raw=PERIOD_RAW_DATA[currentPeriod];
  if(raw){const row=raw.find(r=>r[2]===cid);if(row)row[11]=val;}
  let sw={};try{sw=JSON.parse(localStorage.getItem(storageKey(SAVE_KEY_WRITEOFF)))||{};}catch(e){}
  sw[cid]=val;localStorage.setItem(storageKey(SAVE_KEY_WRITEOFF),JSON.stringify(sw));
  renderAll();
}
function onSaturationChange(input){
  const cid=input.dataset.cid,rawVal=input.value.trim();
  const raw=PERIOD_RAW_DATA[currentPeriod];
  if(raw){const row=raw.find(r=>r[2]===cid);if(row)row[9]=rawVal;}
  let ss={};try{ss=JSON.parse(localStorage.getItem(storageKey(SAVE_KEY_SATURATION)))||{};}catch(e){}
  ss[cid]=rawVal;localStorage.setItem(storageKey(SAVE_KEY_SATURATION),JSON.stringify(ss));
  renderAll();
}
function onDateChange(input){
  const cid=input.dataset.cid,field=input.dataset.field,val=input.value.trim();
  if(!/^\d{8}$/.test(val))return;
  const raw=PERIOD_RAW_DATA[currentPeriod];
  if(raw){const row=raw.find(r=>r[2]===cid);if(row)row[field==='startDate'?6:7]=val;}
  renderAll();
}
function deleteRow(counterId){
  if(!editMode)return;
  if(!confirm('确认删除专柜 '+counterId+' 吗？此操作不可撤销。'))return;
  const raw=PERIOD_RAW_DATA[currentPeriod];
  if(raw){const idx=raw.findIndex(r=>r[2]===counterId);if(idx>=0)raw.splice(idx,1);}
  renderAll();
}
function addNewRow(){
  if(!editMode)return;
  const raw=PERIOD_RAW_DATA[currentPeriod];
  if(!raw)return;
  const newId=prompt('请输入新专柜号（唯一标识）：');
  if(!newId)return;
  if(raw.find(r=>r[2]===newId)){alert('专柜号已存在！');return;}
  raw.push(['','',newId,'新专柜','',0,'20260701','20260731','周一～周日','30',0,0]);
  renderAll();
}

function toggleEditMode(){
  if(editMode){editMode=false;updateModeUI();renderAll();return;}
  const pw=prompt('请输入编辑密码：');
  if(pw===EDIT_PASSWORD){editMode=true;updateModeUI();renderAll();}
  else if(pw!==null)alert('密码错误');
}
function updateModeUI(){
  const t=document.getElementById('modeToggle'),l=document.getElementById('modeLabel');
  if(editMode){t.classList.add('edit-active');l.textContent='编辑模式';}
  else{t.classList.remove('edit-active');l.textContent='查看模式';}
}
function onPeriodChange(){
  currentPeriod=document.getElementById('periodSelect').value;
  currentCmdDate=PERIOD_CONFIG[currentPeriod].cutoff;
  loadSavedData();
  renderAll();
}
function populatePeriodSelect(){
  const sel=document.getElementById('periodSelect');
  sel.innerHTML='';
  Object.keys(PERIOD_CONFIG).forEach(k=>{
    const p=PERIOD_CONFIG[k];
    sel.innerHTML+='<option value=\"'+k+'\" '+(k===currentPeriod?'selected':'')+'>'+p.label+' ('+p.cutoff.substring(0,4)+'-'+p.cutoff.substring(4,6)+'-'+p.cutoff.substring(6,8)+')</option>';
  });
}
function resetFilters(){document.getElementById('filterRegion').value='';document.getElementById('filterStore').value='';renderAll();}
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  var buttons = document.querySelectorAll('.tab-btn');
  for (var i = 0; i < buttons.length; i++) {
    var oc = buttons[i].getAttribute('onclick') || '';
    if (oc.indexOf(tab) >= 0) buttons[i].classList.add('active');
  }
  document.getElementById('tab-' + tab).classList.add('active');
}

// ==================== INIT ====================
(function(){
  const params=new URLSearchParams(window.location.search);
  if(params.get('edit')==='1'){const pw=prompt('请输入编辑密码：');if(pw===EDIT_PASSWORD){editMode=true;updateModeUI();}}
})();
loadSavedData();
populatePeriodSelect();
updateModeUI();
renderAll();
</script>
