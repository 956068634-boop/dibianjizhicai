/* ========== Reset & Base ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{

body{

<script>
// ==================== DATA & CONFIG ====================
const DAY_MAP = {'周一':1,'周二':2,'周三':3,'周四':4,'周五':5,'周六':6,'周日':7,'星期日':7};

// Current mode: false=view-only, true=editable
let editMode = false;

// Current command date (YYYYMMDD string)
let currentCmdDate = '20260715';

function parseOffPeakDays(str) {
  if (!str || !str.trim()) return [1,2,3,4,5,6,7];
  if (str.includes('节假日') || str.includes('节日')) return [1,2,3,4,5,6,7];
  const days = new Set();
  const normalized = str.replace(/～/g, '至');
  const parts = normalized.split(/[、,，]/);
  for (let part of parts) {
    part = part.trim();
    if (!part) continue;
    if (part.includes('至')) {
      const [s, e] = part.split('至');
      const sd = DAY_MAP[s.trim()];
      const ed = DAY_MAP[e.trim()];
      if (sd && ed) for (let d = sd; d <= ed; d++) days.add(d);
    } else if (part === '全周' || part === '每天' || part === '每日') {
      for (let d = 1; d <= 7; d++) days.add(d);
    } else {
      const d = DAY_MAP[part];
      if (d) days.add(d);
    }
  }
  const result = Array.from(days).sort((a,b)=>a-b);
  return result.length > 0 ? result : [1,2,3,4,5,6,7];
}

function parseDate(str) {
  const s = String(str).trim();
  if (s.length !== 8) return null;
  return new Date(parseInt(s.substring(0,4)), parseInt(s.substring(4,6))-1, parseInt(s.substring(6,8)));
}

function formatDate8(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  return `${y}${m}${d}`;
}

function formatDateDisplay(date) {
  return `${date.getMonth()+1}.${date.getDate()}`;
}

function getDayOfWeekCN(date) { const d = date.getDay(); return d === 0 ? 7 : d; }

function countOffPeakDays(startStr, endStr, offPeakDays) {
  const start = parseDate(startStr);
  const end = parseDate(endStr);
  if (!start || !end || start > end) return 0;
  let count = 0;
  const cur = new Date(start);
  while (cur <= end) {
    if (offPeakDays.includes(getDayOfWeekCN(cur))) count++;
    cur.setDate(cur.getDate() + 1);
  }
  return count;
}

// ==================== SATURATION PARSER ====================
function parseSaturation(raw) {
  const str = String(raw).trim();
  const totalMatch = str.match(/^总量(\d+)/);
  if (totalMatch) return { mode: 'total', value: parseInt(totalMatch[1]) };
  const num = parseInt(str);
  if (!isNaN(num)) return { mode: 'daily', value: num };
  return { mode: 'daily', value: 0 };
}

// ==================== PERIOD GENERATION ====================
function generatePeriods() {
  let minDate = '99999999', maxDate = '99999999';
  rawData.forEach(r => {
    if (r.startDate < minDate) minDate = r.startDate;
    if (r.endDate > maxDate) maxDate = r.endDate;
  });
  const today = new Date();
  const todayStr = formatDate8(today);
  // Go up to December 2026 or today, whichever is later
  const endStr = todayStr > maxDate ? todayStr : maxDate;

  const startY = parseInt(minDate.substring(0,4));
  const startM = parseInt(minDate.substring(4,6));
  const endY = parseInt(endStr.substring(0,4));
  const endM = parseInt(endStr.substring(4,6));

  const periods = [];
  for (let y = startY; y <= endY; y++) {
    const mStart = (y === startY) ? startM : 1;
    const mEnd = (y === endY) ? endM : 12;
    for (let m = mStart; m <= mEnd; m++) {
      const mm = String(m).padStart(2,'0');
      // 1st of month
      periods.push({ label: `${m}.1期`, date: `${y}${mm}01` });
      // 15th of month
      periods.push({ label: `${m}.15期`, date: `${y}${mm}15` });
    }
  }
  return periods;
}

function populatePeriodSelect() {
  const sel = document.getElementById('periodSelect');
  const periods = generatePeriods();
  sel.innerHTML = '';
  periods.forEach((p, i) => {
    const opt = document.createElement('option');
    opt.value = p.date;
    opt.textContent = p.label + ' (' + p.date.substring(0,4) + '-' + p.date.substring(4,6) + '-' + p.date.substring(6,8) + ')';
    if (p.date === currentCmdDate) opt.selected = true;
    sel.appendChild(opt);
  });
  // If currentCmdDate not found, add it
  if (!periods.find(p => p.date === currentCmdDate)) {
    const opt = document.createElement('option');
    opt.value = currentCmdDate;
    opt.textContent = currentCmdDate.substring(4,6) + '.' + currentCmdDate.substring(6,8) + '期';
    opt.selected = true;
    sel.appendChild(opt);
  }
}

// ==================== CALCULATION ENGINE ====================
function calculateAll(commandDateStr) {
  const cmdDate = parseDate(commandDateStr);
  if (!cmdDate) return [];

  return rawData.map(row => {
    const startDate = parseDate(row.startDate);
    const endDate = parseDate(row.endDate);
    const offPeakDays = parseOffPeakDays(row.offPeakDef);

    const effectiveEnd = cmdDate < endDate ? cmdDate : endDate;

    // K: 全周期开展天数
    const K = countOffPeakDays(row.startDate, row.endDate, offPeakDays);

    // L: 已开展有效天数
    let L = 0;
    if (cmdDate >= startDate) {
      const cutoffStr = formatDate8(effectiveEnd);
      L = countOffPeakDays(row.startDate, cutoffStr, offPeakDays);
    }

    // M: 日买断金额
    const M = K > 0 ? row.amount / K : 0;

    // N: 已付出买断成本
    const N = M * L;

    // P: 时间进度
    const P = K > 0 ? L / K : 0;

    // Q: 饱和承接人数 (总量模式: 总量×P; 日常模式: J×L)
    const satInfo = parseSaturation(row.dailySaturation);
    const Q = satInfo.mode === 'total' ? satInfo.value * P : satInfo.value * L;

    // R: 实际核销
    const R = row.actualWriteOff;

    // S: 饱和率
    const S = Q > 0 ? R / Q : null;

    // T: 人均成本
    const T = R > 0 ? N / R : null;

    return { ...row, K, L, M, N, P, Q, R, S, T, satInfo, offPeakDays, startDateObj: startDate, endDateObj: endDate };
  });
}

// ==================== AGGREGATION ====================
function aggregateStore(rows) {
  const storeMap = {};
  rows.forEach(r => {
    const key = r.region + '|||' + r.store;
    if (!storeMap[key]) storeMap[key] = { region: r.region, store: r.store, counterIds: new Set(), sumQ: 0, sumR: 0, sumN: 0, sumAmount: 0, sumTarget: 0 };
    const s = storeMap[key];
    s.counterIds.add(r.counterId);
    s.sumQ += r.Q; s.sumR += r.R; s.sumN += r.N; s.sumAmount += r.amount;
    s.sumTarget += (typeof r.targetWriteOff === 'number' ? r.targetWriteOff : 0);
  });
  return Object.values(storeMap).map(s => ({
    region: s.region, store: s.store, counterCount: s.counterIds.size,
    sumQ: s.sumQ, sumR: s.sumR, sumN: s.sumN, sumAmount: s.sumAmount, sumTarget: s.sumTarget,
    saturation: s.sumQ > 0 ? s.sumR / s.sumQ : null,
    avgCost: s.sumR > 0 ? s.sumN / s.sumR : null,
  }));
}

function aggregateRegion(storeRows) {
  const regionMap = {};
  storeRows.forEach(s => {
    const key = s.region;
    if (!regionMap[key]) regionMap[key] = { region: s.region, storeSet: new Set(), counterCount: 0, sumQ: 0, sumR: 0, sumN: 0, sumAmount: 0, sumTarget: 0 };
    const r = regionMap[key];
    r.storeSet.add(s.store); r.counterCount += s.counterCount;
    r.sumQ += s.sumQ; r.sumR += s.sumR; r.sumN += s.sumN; r.sumAmount += s.sumAmount; r.sumTarget += s.sumTarget;
  });
  return Object.values(regionMap).map(r => ({
    region: r.region, storeCount: r.storeSet.size, counterCount: r.counterCount,
    sumQ: r.sumQ, sumR: r.sumR, sumN: r.sumN, sumAmount: r.sumAmount, sumTarget: r.sumTarget,
    saturation: r.sumQ > 0 ? r.sumR / r.sumQ : null,
    avgCost: r.sumR > 0 ? r.sumN / r.sumR : null,
  }));
}

// ==================== FORMATTING ====================
function fmtNum(n, decimals) {
  if (n == null || isNaN(n)) return '-';
  return n.toLocaleString('zh-CN', { minimumFractionDigits: decimals||0, maximumFractionDigits: decimals||0 });
}

function fmtMoney(n) {
  if (n == null || isNaN(n)) return '-';
  return '¥' + n.toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}

function fmtMoneyDec(n) {
  if (n == null || isNaN(n)) return '-';
  return '¥' + n.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtPct(n) {
  if (n == null) return '-';
  return (n * 100).toFixed(1) + '%';
}

function fmtPctHtml(n) {
  if (n == null) return '-';
  const pct = n * 100;
  let cls = pct >= 80 ? 'rate-high' : pct >= 50 ? 'rate-mid' : 'rate-low';
  return `<span class="${cls}">${pct.toFixed(1)}%</span>`;
}

function fmtCostHtml(n) {
  if (n == null) return '-';
  let cls = n <= 80 ? 'cost-good' : 'cost-warn';
  return `<span class="${cls}">¥${n.toFixed(2)}</span>`;
}

function fmtDate8(str) {
  if (!str || str.length !== 8) return str;
  return str.substring(0,4) + '-' + str.substring(4,6) + '-' + str.substring(6,8);
}

function getCutoffLabel() {
  const d = parseDate(currentCmdDate);
  if (!d) return '';
  return '（截至' + (d.getMonth()+1) + '.' + d.getDate() + '）';
}

  } else {
    filtered.sort((a,b) => a.region.localeCompare(b.region) || a.store.localeCompare(b.store) || a.counterId.localeCompare(b.counterId));
    filtered.forEach(r => {
      const satDisplay = r.satInfo.mode === 'total'
        ? `<span class="sat-total" title="总量模式：Q=总量×时间进度">${r.dailySaturation}</span>`
        : `<span class="readonly-value">${fmtNum(r.satInfo.value,0)}</span>`;

      const jCell = editMode
        ? `<input class="cell-input" type="text" value="${r.dailySaturation}" data-counter="${r.counterId}" onchange="onDailySaturationChange(this)" style="width:85px;" title="纯数字=单天饱和；总量N=固定总份数×时间进度">`
        : satDisplay;

      const rCell = editMode
        ? `<input class="cell-input" type="number" value="${r.R}" data-counter="${r.counterId}" onchange="onActualWriteOffChange(this)" style="width:80px;">`
        : `<span class="readonly-value">${fmtNum(r.R,0)}</span>`;

      const qTitle = r.satInfo.mode === 'total'
        ? `总量${r.satInfo.value} × ${(r.P*100).toFixed(1)}% = ${r.Q.toFixed(1)}`
        : `${r.satInfo.value} × ${r.L} = ${r.Q.toFixed(0)}`;

      html += `<tr>
        <td class="text-left">${r.region}</td><td class="text-left">${r.store}</td><td>${r.counterId}</td>
        <td class="text-left">${r.counterName}</td><td class="text-left">${r.content}</td>
        <td class="text-right num">${fmtMoney(r.amount)}</td><td>${fmtDate8(r.startDate)}</td><td>${fmtDate8(r.endDate)}</td>
        <td>${r.offPeakDef}</td><td class="text-right">${jCell}</td>
        <td class="text-right num">${fmtNum(r.K,0)}</td><td class="text-right num">${fmtNum(r.L,0)}</td>
        <td class="text-right num">${fmtMoneyDec(r.M)}</td><td class="text-right num">${fmtMoneyDec(r.N)}</td>
        <td class="text-right num">${typeof r.targetWriteOff==='number'?fmtNum(r.targetWriteOff,0):r.targetWriteOff}</td>
        <td>${fmtPctHtml(r.P)}</td><td class="text-right num" title="${qTitle}">${fmtNum(r.Q,0)}</td>
        <td class="text-right">${rCell}</td><td>${fmtPctHtml(r.S)}</td><td>${fmtCostHtml(r.T)}</td>
      </tr>`;
    });
  }
  html += '</tbody>';
  document.getElementById('detailTable').innerHTML = html;
}

// ==================== EVENT HANDLERS ====================
function onActualWriteOffChange(input) {
  const counterId = input.dataset.counter;
  const newVal = parseInt(input.value) || 0;
  const row = rawData.find(r => r.counterId === counterId);
  if (row) row.actualWriteOff = newVal;
  savedWriteOffs[counterId] = newVal;
  try { localStorage.setItem(SAVE_KEY_WRITEOFF, JSON.stringify(savedWriteOffs)); } catch(e) {}
  renderAll();
}

function onDailySaturationChange(input) {
  const counterId = input.dataset.counter;
  const rawVal = input.value.trim();
  const row = rawData.find(r => r.counterId === counterId);
  const numVal = parseInt(rawVal);
  if (row) row.dailySaturation = (!isNaN(numVal) && String(numVal) === rawVal) ? numVal : rawVal;
  savedSaturations[counterId] = row ? row.dailySaturation : rawVal;
  try { localStorage.setItem(SAVE_KEY_SATURATION, JSON.stringify(savedSaturations)); } catch(e) {}
  renderAll();
}

function resetFilters() {
  document.getElementById('filterRegion').value = '';
  document.getElementById('filterStore').value = '';
  renderAll();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  const targetBtn = document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`);
  if (targetBtn) targetBtn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

// ==================== EXPORT ====================
function exportCSV() {
  const filtered = getFilteredData();
  const cutoffLabel = getCutoffLabel().replace(/[（）]/g,'');
  const headers = [
    '战区','门店','专柜号','专柜名称','采购内容',
    '立项金额','开始日期','截止日期','闲时定义','单天饱和',
    '全周期开展天数','已开展有效天数'+cutoffLabel,'日买断金额','已付出买断成本',
    '全周期目标核销','时间进度','饱和承接人数','实际核销','饱和率','人均成本'
  ];
  const rows = filtered.map(r => [
    r.region, r.store, r.counterId, r.counterName, r.content,
    r.amount, fmtDate8(r.startDate), fmtDate8(r.endDate), r.offPeakDef, r.dailySaturation,
    r.K, r.L, r.M.toFixed(2), r.N.toFixed(2),
    r.targetWriteOff, (r.P*100).toFixed(1)+'%', r.Q.toFixed(r.satInfo.mode==='total'?1:0), r.R,
    r.S != null ? (r.S*100).toFixed(1)+'%' : '', r.T != null ? r.T.toFixed(2) : ''
  ]);
  let csv = '﻿' + headers.join(',') + '\n';
  rows.forEach(row => { csv += row.map(c => '"' + String(c).replace(/"/g,'""') + '"').join(',') + '\n'; });
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '直采专柜活动一览表_'+currentCmdDate+'.csv';
  a.click();
  URL.revokeObjectURL(url);
}

populatePeriodSelect();
updateModeUI();
renderAll();
